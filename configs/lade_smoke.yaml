seed: 17
data:
  source: lade_normalized
  path: artifacts/sample_lade_normalized.csv
  snapshot_stride: 2
  default_service_minutes: 5.0
  assumed_speed_kmh: 15.0
split:
  train: 0.6
  validation: 0.15
  calibration: 0.1
  test: 0.15
rcot:
  min_cohort_rows: 8
  min_cohort_groups: 3
  support_shrinkage: 12.0
  max_dispersion_minutes: 45.0
  cross_fit_splits: 4
model:
  n_estimators: 80
  learning_rate: 0.05
  num_leaves: 20
  min_child_samples: 8
  random_state: 17
advanced:
  enabled: false
  epochs: 1
  batch_size: 32
  hidden_dim: 32
  learning_rate: 0.001
  max_tasks: 20
  amp: false
  deterministic: true
calibration:
  lower_alpha: 0.1
  upper_alpha: 0.9
  target_coverage: 0.8
  minimum_test_rows: 20
  coverage_tolerance: 0.15
decision:
  capacities:
  - 0.1
  - 0.2
  review_cost: 1.0
  selection_capacity: 0.1
  minimum_validation_tail_events: 5
  minimum_test_tail_events: 3
