name: release-attest

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci-py311.txt
      - name: Install tested environment
        run: python -m pip install -c constraints/ci-py311.txt -e ".[dev]"
      - name: Build and validate release
        run: make release
      - name: Attest wheel, source distribution, manifest, and SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*
            artifacts/release_manifest.json
            reports/sbom.cdx.json
            reports/reproducibility_report.json
            reports/distribution_reproducibility.json
            release_candidate_handoff.json
            release_candidate_handoff.json.sha256
            reports/api_concurrency_benchmark.json
            reports/locking_recovery_report.json
      - name: Bind runtime SBOM to wheel
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl
          sbom-path: reports/sbom.cdx.json
