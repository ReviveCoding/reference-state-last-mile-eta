<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="660" viewBox="0 0 1440 660" role="img" aria-labelledby="title desc">
  <title id="title">Leakage-Safe Cohort Isolation</title>
  <desc id="desc">Diagram showing a courier-day universe divided into disjoint pilot, city-base confirmation, V2 development, and V2 final confirmation cohorts.</desc>
  <rect width="1440" height="660" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1440" height="104" fill="#0F172A"/>
  <text x="72" y="52" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Leakage-Safe Cohort Isolation</text>
  <text x="72" y="82" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="17">Whole-courier-day partitioning keeps development decisions separate from final confirmation</text>
  <rect x="530" y="138" width="380" height="88" rx="18" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="720" y="176" text-anchor="middle" fill="#0C4A6E" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">Raw courier-day universe</text>
  <text x="720" y="205" text-anchor="middle" fill="#075985" font-family="Arial, Helvetica, sans-serif" font-size="16">Normalized event-time records</text>
  <line x1="720" y1="226" x2="720" y2="276" stroke="#94A3B8" stroke-width="3"/>
  <line x1="232" y1="276" x2="1208" y2="276" stroke="#94A3B8" stroke-width="3"/>
  <line x1="232" y1="276" x2="232" y2="322" stroke="#94A3B8" stroke-width="3"/>
  <line x1="558" y1="276" x2="558" y2="322" stroke="#94A3B8" stroke-width="3"/>
  <line x1="884" y1="276" x2="884" y2="322" stroke="#94A3B8" stroke-width="3"/>
  <line x1="1208" y1="276" x2="1208" y2="322" stroke="#94A3B8" stroke-width="3"/>
  <rect x="78" y="322" width="308" height="174" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="232" y="365" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Pilot cohort</text>
  <text x="232" y="398" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Pipeline mechanics</text>
  <text x="232" y="430" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">and early diagnostics</text>
  <rect x="155" y="452" width="154" height="28" rx="14" fill="#E2E8F0"/>
  <text x="232" y="472" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">EXCLUDED LATER</text>
  <rect x="404" y="322" width="308" height="174" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="558" y="365" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">City-base confirmation</text>
  <text x="558" y="398" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Independent confirmation</text>
  <text x="558" y="430" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">of the earlier baseline</text>
  <rect x="481" y="452" width="154" height="28" rx="14" fill="#E2E8F0"/>
  <text x="558" y="472" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">EXCLUDED LATER</text>
  <rect x="730" y="322" width="308" height="174" rx="18" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
  <text x="884" y="365" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">V2 development</text>
  <text x="884" y="398" text-anchor="middle" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="16">Feature design and model lock</text>
  <text x="884" y="430" text-anchor="middle" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="16">No final-cohort access</text>
  <rect x="807" y="452" width="154" height="28" rx="14" fill="#D1FAE5"/>
  <text x="884" y="472" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">LOCKED BEFORE TEST</text>
  <rect x="1054" y="312" width="308" height="194" rx="18" fill="#FFFFFF" stroke="#38BDF8" stroke-width="3"/>
  <text x="1208" y="355" text-anchor="middle" fill="#0C4A6E" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">V2 final confirmation</text>
  <text x="1208" y="388" text-anchor="middle" fill="#075985" font-family="Arial, Helvetica, sans-serif" font-size="16">1,716 courier-days</text>
  <text x="1208" y="418" text-anchor="middle" fill="#075985" font-family="Arial, Helvetica, sans-serif" font-size="16">39,941 normalized rows</text>
  <text x="1208" y="448" text-anchor="middle" fill="#075985" font-family="Arial, Helvetica, sans-serif" font-size="16">Three cities • 0 overlap</text>
  <rect x="1131" y="466" width="154" height="28" rx="14" fill="#E0F2FE"/>
  <text x="1208" y="486" text-anchor="middle" fill="#0C4A6E" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">UNTOUCHED TEST</text>
  <rect x="72" y="550" width="1296" height="56" rx="14" fill="#FFFFFF" stroke="#D7E0EB" stroke-width="2"/>
  <text x="720" y="585" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Final confirmation excludes pilot, prior confirmation, and development courier-days, so model-selection decisions cannot reuse the final evidence.</text>
</svg>
